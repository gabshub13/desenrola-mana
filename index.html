<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Desenrola Mana</title>
  <style>
    :root{--ink:#231f2d;--muted:#7a7384;--bg:#faf8fc;--card:#fff;--line:#eee8f3;--violet:#7c3aed;--lilac:#ede2ff;--rose:#ff6f91;--peach:#ffe5d6}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink)}button,input,textarea{font:inherit}
    .app{max-width:430px;min-height:100vh;margin:auto;background:var(--bg);padding:22px}.center{display:grid;align-content:center;min-height:100vh}.brand{width:76px;height:76px;border-radius:24px;background:var(--violet);display:grid;place-items:center;color:white;font-weight:900;font-size:24px}
    h1{font-size:34px;line-height:1.05;margin:18px 0 12px;font-weight:900;letter-spacing:0}h2{font-size:24px;margin:24px 0 14px}.muted{color:var(--muted);line-height:1.45}.btn{width:100%;border:0;border-radius:28px;padding:16px 18px;background:var(--violet);color:white;font-weight:900;margin-top:12px}.ghost{background:var(--lilac);color:var(--violet)}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.icon{border:0;background:#f3eff8;border-radius:50%;width:46px;height:46px;font-size:22px}.search{display:flex;gap:10px;background:white;border-radius:30px;padding:16px 18px;margin:16px 0}.search input{border:0;outline:0;flex:1}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cat,.card,.row,.slot,.pay,.token{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px}.cat{height:112px;display:flex;flex-direction:column;justify-content:space-between;font-weight:900}.avatar{width:62px;height:62px;border-radius:24px;background:var(--peach);display:grid;place-items:center;color:var(--rose);font-weight:900;margin-bottom:10px}.row{display:flex;gap:14px;align-items:center;margin-bottom:12px}.grow{flex:1}.price{font-weight:900;margin-top:6px}.pill{display:inline-block;background:#f3eff8;border-radius:18px;padding:9px 12px;margin:0 6px 12px 0;font-weight:800}.stats{display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:18px;padding-top:16px;text-align:center}.service,.comment{padding:14px;border-radius:16px;margin:9px 0;background:white;border:1px solid var(--line)}.comment{background:var(--lilac)}
    .slot{display:flex;justify-content:space-between;margin:10px 0}.on{border-color:var(--violet);background:var(--lilac)}.total{font-size:40px;font-weight:900;color:var(--violet)}.bubble{max-width:84%;padding:13px;border-radius:18px;margin:10px 0;background:white}.me{margin-left:auto;background:var(--violet);color:white}.composer{display:flex;gap:8px;position:sticky;bottom:0;background:white;padding:12px;margin:16px -22px -22px}.composer input,.field{width:100%;border:1px solid var(--line);border-radius:20px;padding:14px;background:white}.token{text-align:center}.token strong{font-size:48px;letter-spacing:6px}.stars button{border:0;background:transparent;font-size:42px;color:var(--rose)}textarea{min-height:120px}
  </style>
</head>
<body><main id="app" class="app"></main><script>
const cats=["Beleza","Casa","Aulas","Bem-estar","Eventos","Consultoria"];
const pros=[
{id:1,n:"Lia Martins",c:"Beleza",t:"Maquiadora social e noivas",r:4.97,a:126,p:90,av:"LM",bio:"Atendimento acolhedor, pontual e especializado em pele real para eventos, fotos e autocuidado.",s:["Make social - R$ 90","Penteado simples - R$ 70","Noiva express - R$ 180"],cm:["Fiquei linda e tranquila.","Pontual, cuidadosa e muito talentosa."]},
{id:2,n:"Rafa Nunes",c:"Casa",t:"Organizacao residencial",r:4.91,a:88,p:120,av:"RN",bio:"Organizo armarios, cozinhas e rotinas domesticas com metodo simples.",s:["Diaria - R$ 120","Closet - R$ 160","Cozinha - R$ 140"],cm:["Mudou minha rotina.","Pratica, gentil e eficiente."]},
{id:3,n:"Bia Costa",c:"Aulas",t:"Aulas particulares de matematica",r:4.95,a:74,p:85,av:"BC",bio:"Aulas com linguagem facil, exercicios guiados e plano por objetivo.",s:["Aula avulsa - R$ 85","Pacote 4 aulas - R$ 300"],cm:["Minha filha ganhou confianca.","Explica com paciencia."]},
{id:4,n:"Nina Prado",c:"Bem-estar",t:"Massoterapia relaxante",r:4.89,a:63,p:130,av:"NP",bio:"Sessoes de relaxamento, drenagem e cuidado corporal com escuta.",s:["Relaxante - R$ 130","Drenagem - R$ 150"],cm:["Sai renovada.","Muito profissional."]}
];
let st={view:"welcome",cat:"Beleza",pro:pros[0],paid:false,date:"Qua, 29 mai - 14:00",token:"",rating:0};
const app=document.getElementById("app"), money=n=>"R$ "+n.toFixed(0), go=v=>{st.view=v;render()}, pickCat=c=>{st.cat=c;st.view="search";render()}, pickPro=p=>{st.pro=p;st.view="profile";render()};
function top(back,title="",right=""){return `<div class=top><button class=icon onclick="go('${back}')"><</button><b>${title}</b><span>${right}</span></div>`}
function avatar(p){return `<div class=avatar>${p.av}</div>`}
function render(){
 if(st.view=="welcome") app.innerHTML=`<section class=center><div class=brand>DM</div><h1>Desenrola Mana</h1><p class=muted>Servicos feitos por mulheres, para mulheres, com reserva segura e conversa liberada no momento certo.</p><button class=btn onclick="go('home')">Quero Contratar</button><button class="btn ghost">Quero Prestar Servicos</button></section>`;
 if(st.view=="home") app.innerHTML=`<h1>Encontre uma mana para resolver</h1><label class=search>Search <input placeholder="Buscar servico"></label><h2>Categorias</h2><div class=grid>${cats.map(c=>`<button class=cat onclick="pickCat('${c}')"><span>*</span>${c}</button>`).join("")}</div><h2>Mais buscados</h2>${pros.map(p=>`<div class=row onclick="pickPro(pros.find(x=>x.id==${p.id}))">${avatar(p)}<div class=grow><b>${p.t}</b><p class=muted>${p.c} - * ${p.r}</p><p class=price>A partir de ${money(p.p)}</p></div></div>`).join("")}`;
 if(st.view=="search"){let list=pros.filter(p=>p.c==st.cat); if(!list.length)list=pros; app.innerHTML=top("home",st.cat)+`<span class=pill>Hoje</span><span class=pill>Ate R$150</span><span class=pill>Melhor avaliadas</span>${list.map(p=>`<div class=row onclick="pickPro(pros.find(x=>x.id==${p.id}))">${avatar(p)}<div class=grow><b>${p.n}</b><p class=muted>${p.t}</p><p class=muted>* ${p.r} - ${p.a} avaliacoes</p></div><b>${money(p.p)}</b></div>`).join("")}`}
 if(st.view=="profile"){let p=st.pro; app.innerHTML=top("search","Fav")+`<section class=card style=text-align:center>${avatar(p)}<h1>${p.n}</h1><p class=muted>${p.t}</p><div class=stats><b>${p.r}<br><small>nota</small></b><b>*****<br><small>favorita</small></b><b>${p.a}<br><small>avaliacoes</small></b></div></section><h2>Sobre</h2><p>${p.bio}</p><h2>Servicos</h2>${p.s.map(x=>`<div class=service>${x}</div>`).join("")}<h2>Avaliacoes</h2>${p.cm.map(x=>`<div class=comment>"${x}"</div>`).join("")}<button class=btn onclick="go('booking')">Agendar</button>`}
 if(st.view=="booking") app.innerHTML=top("profile","Reserva")+`<h1>Escolha um horario</h1>${["Ter, 28 mai - 10:00","Qua, 29 mai - 14:00","Sex, 31 mai - 16:30"].map(x=>`<button class="slot ${st.date==x?'on':''}" onclick="st.date='${x}';render()">${x}<span>${st.date==x?'OK':''}</span></button>`).join("")}<div class=pay><b>Taxa de reserva</b><p class=muted>O chat sera liberado apos o pagamento simulado.</p><div class=total>${money(Math.round(st.pro.p*.2))}</div></div><button class=btn onclick="st.paid=true;st.token=String(Math.floor(100000+Math.random()*900000));go('chat')">Pagar taxa e liberar chat</button>`;
 if(st.view=="chat") app.innerHTML=st.paid?top("profile",st.pro.n,`<button class=icon onclick="go('token')">Token</button>`)+`<div class=bubble>Oi! Vi sua reserva para ${st.date}. Pode me contar o endereco?</div><div class="bubble me">Claro! Envio aqui. Obrigada.</div><div class=bubble>No fim, use o token de seguranca para confirmar.</div><div class=composer><input placeholder=Mensagem><button class=icon>></button></div>`:`<h1>Chat bloqueado</h1><p class=muted>Finalize a taxa de reserva para liberar o chat.</p><button class=btn onclick="go('booking')">Ir para pagamento</button>`;
 if(st.view=="token") app.innerHTML=top("chat","Seguranca")+`<div class=token><p>Token de seguranca</p><strong>${st.token}</strong><p class=muted>Informe este token a prestadora na conclusao do servico.</p></div><h2>Finalizacao</h2><input id=tk class=field placeholder="Digite o token"><button class=btn onclick="tk.value==st.token?go('review'):alert('Token incorreto')">Validar e avaliar</button>`;
 if(st.view=="review") app.innerHTML=top("token","Avaliacao")+`<h1>Como foi com ${st.pro.n}?</h1><div class=stars>${[1,2,3,4,5].map(n=>`<button onclick="st.rating=${n};render()">${n<=st.rating?'*':'o'}</button>`).join("")}</div><textarea class=field placeholder="Conte como foi sua experiencia"></textarea><button class=btn onclick="alert('Avaliacao enviada');go('home')">Enviar avaliacao</button>`;
}
render();
</script></body></html>
